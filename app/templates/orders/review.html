{% extends "base.html" %}

{% block title %}评价订单 - 校园二手书交易平台{% endblock %}

{% block content %}
<div class="container py-3" >
    <!-- 返回 -->
    <a href="{{ url_for('orders.detail', order_id=order.id) }}" class="text-decoration-none d-flex align-items-center mb-3" style="color: #8a8b8c;">
        <i class="bi bi-arrow-left me-2"></i>返回
    </a>
    
    <h5 class="fw-bold mb-3">评价订单</h5>
    
    <!-- 订单信息 -->
    <div class="card-tiktok mb-3">
        <div class="card-body-tiktok">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="text-muted">书籍</span>
                <span class="fw-medium">{{ order.book.title }}</span>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="text-muted">卖家</span>
                <span class="fw-medium">{{ order.seller_order.username }}</span>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted">成交价</span>
                <span class="price">¥{{ order.price }}</span>
            </div>
        </div>
    </div>
    
    <!-- 评价表单 -->
    <div class="card-tiktok">
        <div class="card-body-tiktok">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">评分</label>
                    <div class="d-flex gap-2">
                        {% for i in range(1, 6) %}
                        <input type="radio" class="btn-check" name="rating" id="rating{{ i }}" value="{{ i }}" {{ 'checked' if i == 5 else '' }}>
                        <label class="btn btn-sm" for="rating{{ i }}" style="border: 1px solid #f0f0f0; border-radius: 20px;">
                            {{ i }}⭐
                        </label>
                        {% endfor %}
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">评价内容（可选）</label>
                    <textarea name="content" class="form-control-tiktok" rows="3" placeholder="分享你的购买体验..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-tiktok w-100 py-2">提交评价</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
