{% extends "base.html" %}

{% block title %}确认订单 - 校园二手书交易平台{% endblock %}

{% block content %}
<div class="container py-3" >
    <!-- 返回 -->
    <a href="{{ url_for('books.detail', book_id=book.id) }}" class="text-decoration-none d-flex align-items-center mb-3" style="color: #8a8b8c;">
        <i class="bi bi-arrow-left me-2"></i>返回
    </a>
    
    <h5 class="fw-bold mb-3">确认订单</h5>
    
    <!-- 书籍信息 -->
    <div class="card-book mb-3">
        <div class="card-body-book">
            <div class="d-flex">
                {% if book.cover_image %}
                <img src="{{ url_for('books.uploaded_file', filename=book.cover_image) }}" 
                     alt="{{ book.title }}"
                     style="width: 70px; height: 90px; object-fit: cover; border-radius: 8px;"
                     class="me-3">
                {% else %}
                <div class="bg-light rounded d-flex align-items-center justify-content-center me-3" 
                     style="width: 70px; height: 90px;">
                    <i class="bi bi-book text-muted" style="font-size: 1.5rem;"></i>
                </div>
                {% endif %}
                <div class="flex-grow-1">
                    <div style="font-size: 14px; font-weight: 600;">{{ book.title }}</div>
                    <div class="text-muted" style="font-size: 12px;">{{ book.author or '未知作者' }}</div>
                    <div class="text-muted" style="font-size: 12px;">卖家: {{ book.seller.username }}</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 订单表单 -->
    <div class="card-book">
        <div class="card-body-book">
            <form method="POST" action="{{ url_for('orders.create', book_id=book.id) }}">
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">成交价格</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 20px 0 0 20px; border-right: none;">¥</span>
                        <input type="number" name="price" class="form-control" 
                               value="{{ book.listing_price }}" step="0.01" min="0" required
                               style="border-radius: 0 20px 20px 0;">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">联系方式（手机号）</label>
                    <input type="text" name="contact_info" class="form-control-book" 
                           placeholder="请输入您的手机号"
                           value="{{ current_user.phone or '' }}" required>
                </div>
                
                <div class="alert alert-warning py-2 px-3" style="font-size: 12px; border-radius: 12px; border: none; background: #fef3c7;">
                    <i class="bi bi-info-circle me-1"></i>确认后，卖家将收到通知，请保持手机畅通
                </div>
                
                <button type="submit" class="btn btn-book w-100 py-2">
                    <i class="bi bi-check2-circle me-2"></i>确认下单
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
