{% extends "base.html" %}

{% block title %}编辑资料 - 校园二手书交易平台{% endblock %}

{% block content %}
<div class="container py-3" style="max-width: 500px;">
    <!-- 返回 -->
    <a href="{{ url_for('auth.profile') }}" class="text-decoration-none d-flex align-items-center mb-3" style="color: #8a8b8c;">
        <i class="bi bi-arrow-left me-2"></i>返回
    </a>
    
    <h5 class="fw-bold mb-3">编辑资料</h5>
    
    <!-- 表单 -->
    <div class="card-book">
        <div class="card-body-book">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">手机号</label>
                    <input type="text" name="phone" class="form-control-book" value="{{ current_user.phone or '' }}">
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">学号</label>
                    <input type="text" name="student_id" class="form-control-book" value="{{ current_user.student_id or '' }}">
                </div>
                
                <hr>
                
                <h6 class="mb-3">修改密码（可选）</h6>
                
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">新密码</label>
                    <input type="password" name="new_password" class="form-control-book" placeholder="留空则不修改">
                </div>
                
                <button type="submit" class="btn btn-book w-100 py-2">保存</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
