{% extends "base.html" %}

{% block title %}编辑资料 - 校园二手书交易平台{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">编辑资料</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">手机号</label>
                            <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">学号</label>
                            <input type="text" name="student_id" class="form-control" value="{{ current_user.student_id or '' }}">
                        </div>
                        <hr>
                        <h5>修改密码（可选）</h5>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" name="new_password" class="form-control" placeholder="留空则不修改">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">保存</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
