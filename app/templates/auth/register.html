{% extends "base.html" %}

{% block title %}注册 - 校园二手书交易平台{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 400px;">
    <!-- Logo -->
    <div class="text-center mb-4">
        <div class="rounded-circle d-inline-flex align-items-center justify-content-center" 
             style="width: 64px; height: 64px; background: linear-gradient(135deg, #6b4ceb, #8b5cf6);">
            <i class="bi bi-book-half text-white" style="font-size: 28px;"></i>
        </div>
        <h5 class="mt-3 fw-bold">校园二手书</h5>
        <p class="text-muted" style="font-size: 13px;">让书籍循环，让知识传递</p>
    </div>
    
    <div class="card-tiktok">
        <div class="card-body-tiktok">
            <h5 class="text-center mb-4 fw-bold">注册</h5>
            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control-tiktok" placeholder="用户名" required>
                </div>
                <div class="mb-3">
                    <input type="email" name="email" class="form-control-tiktok" placeholder="邮箱" required>
                </div>
                <div class="mb-3 position-relative">
                    <input type="password" name="password" id="regPassword" class="form-control-tiktok" placeholder="密码" required>
                    <button type="button" class="btn position-absolute end-0 top-0 p-2 border-0 bg-transparent" 
                            onclick="togglePassword('regPassword', this)" style="z-index: 10;">
                        <i class="bi bi-eye" style="color: #6b4ceb;"></i>
                    </button>
                </div>
                <div class="mb-3 position-relative">
                    <input type="password" name="confirm_password" id="regConfirmPassword" class="form-control-tiktok" placeholder="确认密码" required>
                    <button type="button" class="btn position-absolute end-0 top-0 p-2 border-0 bg-transparent" 
                            onclick="togglePassword('regConfirmPassword', this)" style="z-index: 10;">
                        <i class="bi bi-eye" style="color: #6b4ceb;"></i>
                    </button>
                </div>
                <button type="submit" class="btn btn-tiktok w-100 py-2">注册</button>
            </form>
            <hr>
            <p class="text-center mb-0" style="font-size: 13px;">
                已有账号？
                <a href="{{ url_for('auth.login') }}" style="color: #6b4ceb; text-decoration: none;">立即登录</a>
            </p>
        </div>
    </div>
</div>

<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
    }
}
</script>
{% endblock %}
