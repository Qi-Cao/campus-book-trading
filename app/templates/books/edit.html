{% extends "base.html" %}

{% block title %}编辑书籍 - 校园二手书交易平台{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-pencil"></i> 编辑书籍</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">书名 <span class="text-danger">*</span></label>
                                <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">作者</label>
                                <input type="text" name="author" class="form-control" value="{{ book.author or '' }}">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">ISBN</label>
                                <input type="text" name="isbn" class="form-control" value="{{ book.isbn or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">版本</label>
                                <select name="edition" class="form-select">
                                    <option value="latest" {{ 'selected' if book.edition == 'latest' else '' }}>最新版</option>
                                    <option value="recent" {{ 'selected' if book.edition == 'recent' else '' }}>近几年</option>
                                    <option value="old" {{ 'selected' if book.edition == 'old' else '' }}>旧版</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">原价（元）</label>
                                <input type="number" name="original_price" class="form-control" step="0.01" min="0" value="{{ book.original_price or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">挂牌价格 <span class="text-danger">*</span></label>
                                <input type="number" name="listing_price" class="form-control" step="0.01" min="0" value="{{ book.listing_price }}" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">新旧程度</label>
                                <select name="condition" class="form-select">
                                    <option value="new" {{ 'selected' if book.condition == 'new' else '' }}>全新</option>
                                    <option value="like_new" {{ 'selected' if book.condition == 'like_new' else '' }}>几乎全新</option>
                                    <option value="good" {{ 'selected' if book.condition == 'good' else '' }}>较好</option>
                                    <option value="fair" {{ 'selected' if book.condition == 'fair' else '' }}>一般</option>
                                    <option value="poor" {{ 'selected' if book.condition == 'poor' else '' }}>较差</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">分类</label>
                                <select name="category" class="form-select">
                                    <option value="教材" {{ 'selected' if book.category == '教材' else '' }}>教材</option>
                                    <option value="小说" {{ 'selected' if book.category == '小说' else '' }}>小说</option>
                                    <option value="杂志" {{ 'selected' if book.category == '杂志' else '' }}>杂志</option>
                                    <option value="工具书" {{ 'selected' if book.category == '工具书' else '' }}>工具书</option>
                                    <option value="其他" {{ 'selected' if book.category == '其他' else '' }}>其他</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">描述</label>
                            <textarea name="description" class="form-control" rows="4">{{ book.description or '' }}</textarea>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1">保存修改</button>
                            <a href="{{ url_for('books.detail', book_id=book.id) }}" class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
