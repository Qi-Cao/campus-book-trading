{% extends "base.html" %}

{% block title %}智能定价计算器 - 校园二手书交易平台{% endblock %}

{% block content %}
<div class="container py-3" >
    <!-- 返回 -->
    <a href="{{ url_for('main.index') }}" class="text-decoration-none d-flex align-items-center mb-3" style="color: #8a8b8c;">
        <i class="bi bi-arrow-left me-2"></i>返回
    </a>
    
    <h5 class="fw-bold mb-3">智能定价</h5>
    
    <!-- 计算器表单 -->
    <div class="card-book">
        <div class="card-body-book">
            <form id="pricingForm">
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">书籍原价（元）</label>
                    <input type="number" id="original_price" class="form-control-book" step="0.01" min="0" placeholder="参考售价">
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">新旧程度</label>
                    <select id="condition" class="form-select-book">
                        <option value="new">全新</option>
                        <option value="like_new">几乎全新</option>
                        <option value="good" selected>较好</option>
                        <option value="fair">一般</option>
                        <option value="poor">较差</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">版本</label>
                    <select id="edition" class="form-select-book">
                        <option value="latest">最新版</option>
                        <option value="recent" selected>近几年</option>
                        <option value="old">旧版</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">分类</label>
                    <select id="category" class="form-select-book">
                        <option value="教材" selected>教材</option>
                        <option value="小说">小说</option>
                        <option value="杂志">杂志</option>
                        <option value="工具书">工具书</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="font-size: 13px;">ISBN（可选）</label>
                    <input type="text" id="isbn" class="form-control-book" placeholder="用于参考历史价格">
                </div>
                
                <button type="button" class="btn btn-book w-100 py-2" onclick="calculatePrice()">
                    <i class="bi bi-calculator me-2"></i>计算价格
                </button>
            </form>
        </div>
    </div>
    
    <!-- 计算结果 -->
    <div id="result" class="mt-3" style="display: none;">
        <div class="card-book">
            <div class="card-body-book text-center">
                <div class="text-muted mb-2" style="font-size: 13px;">建议售价</div>
                <div class="fw-bold mb-3" style="font-size: 32px; color: #ff4757;" id="smartPrice">-</div>
                
                <div class="d-flex justify-content-center gap-4 mb-3">
                    <div>
                        <div class="text-muted" style="font-size: 12px;">最低</div>
                        <div class="fw-medium" id="minPrice">-</div>
                    </div>
                    <div>
                        <div class="text-muted" style="font-size: 12px;">最高</div>
                        <div class="fw-medium" id="maxPrice">-</div>
                    </div>
                </div>
                
                <div class="text-start p-2" style="background: #f9fafb; border-radius: 8px; font-size: 12px;">
                    <div class="mb-1">新旧程度系数: <span id="conditionScore" class="text-muted">-</span></div>
                    <div class="mb-1">版本系数: <span id="editionScore" class="text-muted">-</span></div>
                    <div>市场供需系数: <span id="demandScore" class="text-muted">-</span></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function calculatePrice() {
    const data = {
        original_price: parseFloat(document.getElementById('original_price').value) || 0,
        condition: document.getElementById('condition').value,
        edition: document.getElementById('edition').value,
        category: document.getElementById('category').value,
        isbn: document.getElementById('isbn').value
    };
    
    fetch('/books/api/calculate-price', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            const d = result.data;
            document.getElementById('minPrice').textContent = '¥' + d.min_price;
            document.getElementById('smartPrice').textContent = '¥' + d.smart_price;
            document.getElementById('maxPrice').textContent = '¥' + d.max_price;
            document.getElementById('conditionScore').textContent = d.condition_score;
            document.getElementById('editionScore').textContent = d.edition_score;
            document.getElementById('demandScore').textContent = d.demand_score;
            document.getElementById('result').style.display = 'block';
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('计算失败，请重试');
    });
}
</script>
{% endblock %}
