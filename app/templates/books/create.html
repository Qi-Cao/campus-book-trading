{% extends "base.html" %}

{% block title %}发布书籍 - 校园二手书交易平台{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-plus-circle"></i> 发布书籍</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data" id="bookForm">
                        <!-- AI智能识别区域 -->
                        <div class="alert alert-info mb-4">
                            <h5><i class="bi bi-robot"></i> AI智能识别（可选）</h5>
                            <p class="mb-2">上传书籍照片，AI自动识别书名、作者、ISBN，并评估新旧程度</p>
                            
                            <div class="row align-items-center">
                                <div class="col-md-8">
                                    <input type="file" class="form-control" id="bookImage" accept="image/*" onchange="previewImage(this)">
                                </div>
                                <div class="col-md-4">
                                    <button type="button" class="btn btn-success w-100" onclick="analyzeBookImage()">
                                        <i class="bi bi-cpu"></i> AI分析
                                    </button>
                                </div>
                            </div>
                            <!-- 图片预览 -->
                            <div id="imagePreview" class="mt-3" style="display: none;">
                                <img id="previewImg" src="" alt="预览" class="img-thumbnail" style="max-height: 200px;">
                            </div>
                            <!-- AI识别结果 -->
                            <div id="aiResult" class="mt-3" style="display: none;">
                                <div class="alert alert-success">
                                    <h6>AI识别结果：</h6>
                                    <p class="mb-1"><strong>书名：</strong><span id="aiBookName">-</span></p>
                                    <p class="mb-1"><strong>作者：</strong><span id="aiAuthor">-</span></p>
                                    <p class="mb-1"><strong>ISBN：</strong><span id="aiIsbn">-</span></p>
                                    <p class="mb-1">
                                        <strong>新旧程度：</strong>
                                        <span id="aiCondition" class="badge bg-success">-</span>
                                        <small class="text-muted" id="aiConditionReason"></small>
                                    </p>
                                    <input type="hidden" name="ai_condition" id="aiConditionInput">
                                </div>
                            </div>
                            <div id="aiLoading" class="mt-3" style="display: none;">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <span class="ms-2">AI分析中...</span>
                            </div>
                            <div id="aiError" class="mt-3" style="display: none;">
                                <div class="alert alert-danger" id="aiErrorMsg"></div>
                            </div>
                        </div>
                        
                        <hr>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">书名 <span class="text-danger">*</span></label>
                                <input type="text" name="title" class="form-control" id="inputTitle" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">作者</label>
                                <input type="text" name="author" class="form-control" id="inputAuthor">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">ISBN</label>
                                <input type="text" name="isbn" class="form-control" id="inputIsbn" placeholder="可用于智能定价">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">版本</label>
                                <select name="edition" class="form-select">
                                    <option value="latest">最新版</option>
                                    <option value="recent" selected>近几年</option>
                                    <option value="old">旧版</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">出版社</label>
                                <input type="text" name="publisher" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">出版年份</label>
                                <input type="number" name="publish_year" class="form-control" min="1900" max="2030">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">原价（元）</label>
                                <input type="number" name="original_price" class="form-control" step="0.01" min="0">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">挂牌价格 <span class="text-danger">*</span></label>
                                <input type="number" name="listing_price" class="form-control" step="0.01" min="0" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">新旧程度 <span class="text-danger">*</span></label>
                                <select name="condition" class="form-select" id="conditionSelect">
                                    <option value="">-- 请选择或等待AI识别 --</option>
                                    <option value="new">全新</option>
                                    <option value="like_new">几乎全新</option>
                                    <option value="good" selected>较好</option>
                                    <option value="fair">一般</option>
                                    <option value="poor">较差</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">分类 <span class="text-danger">*</span></label>
                                <select name="category" class="form-select" required>
                                    <option value="教材">教材</option>
                                    <option value="小说">小说</option>
                                    <option value="杂志">杂志</option>
                                    <option value="工具书">工具书</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">书籍封面图片</label>
                            <input type="file" name="cover_image" class="form-control" accept="image/*">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">描述</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="描述书籍的具体情况，如使用痕迹、笔记等"></textarea>
                        </div>
                        
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> 
                            <strong>智能定价：</strong>系统会根据书籍的新旧程度、版本、市场供需情况自动计算建议价格。
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">发布书籍</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let uploadedFilename = '';

// 图片预览
function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagePreview').style.display = 'block';
            document.getElementById('previewImg').src = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
    }
}

// 上传图片
async function uploadImage() {
    const fileInput = document.getElementById('bookImage');
    if (!fileInput.files[0]) {
        return null;
    }
    
    const formData = new FormData();
    formData.append('image', fileInput.files[0]);
    
    const response = await fetch('/books/upload', {
        method: 'POST',
        body: formData
    });
    const result = await response.json();
    
    if (result.success) {
        uploadedFilename = result.filename;
        return result.filename;
    }
    return null;
}

// AI分析书籍图片
async function analyzeBookImage() {
    const fileInput = document.getElementById('bookImage');
    if (!fileInput.files[0]) {
        alert('请先选择一张书籍图片');
        return;
    }
    
    // 显示加载状态
    document.getElementById('aiLoading').style.display = 'block';
    document.getElementById('aiResult').style.display = 'none';
    document.getElementById('aiError').style.display = 'none';
    
    try {
        // 先上传图片
        const filename = await uploadImage();
        
        // 调用AI分析
        const response = await fetch('/books/analyze-image', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ filename: filename })
        });
        
        const result = await response.json();
        
        document.getElementById('aiLoading').style.display = 'none';
        
        if (result.success) {
            // 显示识别结果
            document.getElementById('aiResult').style.display = 'block';
            
            // 填充识别结果到表单
            if (result.book_name) {
                document.getElementById('aiBookName').textContent = result.book_name;
                document.getElementById('inputTitle').value = result.book_name;
            }
            if (result.author) {
                document.getElementById('aiAuthor').textContent = result.author;
                document.getElementById('inputAuthor').value = result.author;
            }
            if (result.isbn) {
                document.getElementById('aiIsbn').textContent = result.isbn;
                document.getElementById('inputIsbn').value = result.isbn;
            }
            if (result.condition) {
                const conditionMap = {
                    '全新': 'new',
                    '几乎全新': 'like_new',
                    '较好': 'good',
                    '一般': 'fair',
                    '较差': 'poor'
                };
                const conditionValue = conditionMap[result.condition] || result.condition;
                document.getElementById('aiCondition').textContent = result.condition;
                document.getElementById('conditionSelect').value = conditionValue;
                document.getElementById('aiConditionInput').value = conditionValue;
            }
            if (result.condition_reason) {
                document.getElementById('aiConditionReason').textContent = '（' + result.condition_reason + '）';
            }
        } else {
            document.getElementById('aiError').style.display = 'block';
            document.getElementById('aiErrorMsg').textContent = result.error || '分析失败，请重试';
        }
    } catch (error) {
        document.getElementById('aiLoading').style.display = 'none';
        document.getElementById('aiError').style.display = 'block';
        document.getElementById('aiErrorMsg').textContent = '发生错误：' + error.message;
    }
}
</script>
{% endblock %}
